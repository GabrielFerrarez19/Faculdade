<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Pessoas</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="container py-4">
      <header class="text-center mb-4">
        <h1 class="display-5 fw-bold text-primary">Cadastro de Pessoas</h1>
        <p class="lead text-muted">Gerencie nome, telefone e e-mail</p>
      </header>

      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
            <h2 class="h5 mb-0 card-title">Lista de pessoas</h2>
            <button type="button" class="btn btn-primary" id="btnNovo">
              Nova pessoa
            </button>
          </div>

          <div id="conteudo">
            <p class="text-muted text-center py-4">Carregando...</p>
          </div>
        </div>
      </div>

      <div id="formulario" class="card shadow-sm" style="display: none">
        <div class="card-header bg-primary text-white">
          <h2 class="h5 mb-0" id="formTitulo">Nova pessoa</h2>
        </div>
        <div class="card-body">
          <input type="hidden" id="id" />
          <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>
            <input
              type="text"
              class="form-control"
              id="nome"
              placeholder="Digite o nome"
            />
          </div>
          <div class="mb-3">
            <label for="telefone" class="form-label">Telefone</label>
            <input
              type="text"
              class="form-control"
              id="telefone"
              placeholder="Digite o telefone"
            />
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">E-mail</label>
            <input
              type="email"
              class="form-control"
              id="email"
              placeholder="Digite o e-mail"
            />
          </div>
          <div class="d-flex gap-2">
            <button type="button" class="btn btn-primary" id="btnSalvar">
              Salvar
            </button>
            <button type="button" class="btn btn-outline-secondary" id="btnCancelar">
              Cancelar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="index.js"></script>
  </body>
</html>
